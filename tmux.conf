# ── 前缀键 ──────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── 基础体验 ────────────────────────────────────
set -g mouse on                    # 鼠标点击面板、拖拽边框、滚动
set -g history-limit 50002         # 滚动历史行数
set -g base-index 1                # 窗口编号从 1 开始（0 太远了）
setw -g pane-base-index 1          # 面板编号也从 1 开始
set -g renumber-windows on         # 关闭窗口后自动重新编号
set -s escape-time 0               # 去掉 Esc 延迟（对 vim 用户很重要）
set -g default-terminal "tmux-256color"  # 256 色支持

# ── 更直觉的分屏键 ─────────────────────────────
bind | split-window -h -c "#{pane_current_path}"   # | 垂直分，保持当前目录
bind - split-window -v -c "#{pane_current_path}"   # - 水平分，保持当前目录
bind c new-window -c "#{pane_current_path}"         # 新窗口也保持当前目录

# ── 面板导航（Alt+方向键，不需要前缀）──────────
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── 关闭右键菜单（让 VS Code 终端处理右键）─────
unbind -n MouseDown3Pane
unbind -n MouseUp3Pane

# ── 快速重载配置 ────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── 状态栏 ──────────────────────────────────────
set -g status-position bottom
set -g status-style 'bg=default,fg=magenta'
set -g status-left '#[fg=blue,bold]#S #[default]'
set -g status-right '#[fg=magenta]%H:%M'
set -g status-left-length 20

# 当前窗口高亮
setw -g window-status-current-style 'fg=blue,bold'
setw -g window-status-style 'fg=colour245'

# 面板边框
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=magenta'

# 消息提示
set -g message-style 'fg=magenta,bg=default'

# ── 插件（TPM）─────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# resurrect: 保存/恢复面板中正在运行的程序
set -g @resurrect-capture-pane-contents 'on'

# continuum: 每 15 分钟自动保存
set -g @continuum-restore 'on'

# TPM 初始化（必须放在配置文件最后一行）
run '~/.tmux/plugins/tpm/tpm'
